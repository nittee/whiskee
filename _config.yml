# Site Settings
name: Whiskee
title: Whiskee Blogs
description: Warehouse of 
  Hyperactive 
  Ideas 
  Spanning 
  Knowledge 
  Extracted from the 
  Endless valley of caffeine-infused, boredom-amplified, curiosity
tags:
  - blog
  - ideas
  - stories
  - random
  - science
  - technology
  - philosophy
show_hero: true
menu:
  - title: Home
    url: /
  - title: About
    url: /about
  # - title: Links
  #   url: /links
  # - title: Recs
  #   url: /recs
  # - title: Contact
  #   url: /contact
  # - title: Feed
  #   url: /feed.xml
email: 

# Social Media Settings
# Remove the item if you don't need it
github_username: github_username
instagram_username: instagram_username
linkedin_username: linkedin_username

# Posts Settings
show_time_bar: false
show_modal_on_exit: true
show_modal_on_finish_post: true
two_columns_layout: true


# Advanced Settings
url: "" # the base hostname & protocol for your site
language: "en"
categories_folder: category
sent_message_url: "/contact/message-sent/"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/
collections:
  authors:
    output: true
paginate_path: "/page/:num/"
show_get_theme_btn: true
use_logo: false

# Content paginator
paginate_content:
  enabled: true
  debug: false
  collections:
    - posts
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# SASS
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content

# Exclude my node related stuff
exclude: [
  'package.json',
  'package-lock.json',
  'src',
  'node_modules',
  'initpost.sh',
  'Gemfile',
  'Gemfile.lock',
  'gulpfile.js',
  'README.md'
]

# Theme
version: v3.1.2
